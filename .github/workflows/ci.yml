name: CI

# Minimal remote gate — run locally: uv sync --extra dev && uv run pytest -q && uv run ruff check src tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lockfile integrity
        # Hard-fail on lockfile drift. uv lock --check is a graph-equality
        # check (resolver output matches locked graph), not byte-equality:
        # it catches unresolved pyproject.toml changes silently sneaking past
        # CI, but tolerates cosmetic edits uv itself would normalise away.
        # Do not manually edit uv.lock. Do not add `continue-on-error: true`
        # or `|| true` here; the no-`==` / no-`<=` reproducibility model
        # this project is built on depends on this gate staying hard.
        run: uv lock --check

      - name: Install
        run: uv sync --extra dev --quiet

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
