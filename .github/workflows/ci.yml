name: CI

# Minimal remote gate — run locally: uv sync --extra dev && uv run pytest -q && uv run ruff check src tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --quiet

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
