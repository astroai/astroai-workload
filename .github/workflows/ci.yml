name: CI

# Minimal remote gate — run locally: uv sync --extra dev && uv run pytest -q && uv run ruff check src tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Probe lockfile drift gate
        # Regression test for the gate directly below. Appends a malformed
        # TOML anchor to uv.lock and asserts `uv lock --check` returns
        # non-zero. Self-restoring via an EXIT trap so the working tree ends
        # up clean even if the runner is killed mid-script. If this step ever
        # passes-with-drift, uv's graph gate has been weakened or the YAML
        # step has been reworded away from `uv lock --check`, and MUST be
        # re-hardened.
        run: |
          # Defensive cleanup: a prior SIGKILL'd run can leave a stale
          # uv.lock.bak behind. Force-remove so this run starts clean.
          rm -f uv.lock.bak
          cp uv.lock uv.lock.bak
          trap 'mv -f uv.lock.bak uv.lock 2>/dev/null || true; rm -f uv.lock.bak' EXIT INT TERM
          printf '\n[[[deliberate-drift-probe\n' >> uv.lock
          if uv lock --check >/dev/null 2>&1; then
            echo "ERROR: uv lock --check passed on malformed uv.lock" >&2
            echo "The hard-fail gate is wedged open. Refactor regression." >&2
            exit 1
          fi
          echo "OK: uv lock --check tripped on TOML-mangled uv.lock"

      - name: Lockfile integrity (DO NOT add continue-on-error — uv/gate stays hard)
        # Hard-fail on lockfile drift. uv lock --check is a graph-equality
        # check (resolver output matches locked graph), not byte-equality:
        # it catches unresolved pyproject.toml changes silently sneaking past
        # CI, but tolerates cosmetic edits uv itself would normalise away.
        # Do not manually edit uv.lock. The no-`==` / no-`<=` reproducibility
        # model this project is built on depends on this gate staying hard.
        run: uv lock --check

      - name: Install
        run: uv sync --extra dev --quiet

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
